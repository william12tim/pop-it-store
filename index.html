<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>НЕ_ПУПЫРКА.РУ — Поп-иты и антистресс игрушки</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="hero-section">
    <header class="header">
      <div class="container header__container">
        <a href="#" class="header__logo">НЕ_ПУПЫРКА.РУ</a>
        <nav class="header__nav">
          <a href="#about" class="header__link">О НАС</a>
          <a href="#discounts" class="header__link">СКИДКИ</a>
          <a href="#contacts" class="header__link">КОНТАКТЫ</a>
        </nav>
      </div>
    </header>

    <section class="hero" id="about">
      <div class="container">
        <div class="hero__content">
          <h1 class="hero__title">POP IT!</h1>
          <p class="hero__subtitle">Лучшая игрушка-антистресс - бесконечная пупырчатая пленка!</p>
          <button class="hero__btn" type="button">КУПИТЬ</button>
        </div>
      </div>
    </section>
  </div>

  <main class="catalog" id="discounts">
    <div class="container">
      <h2 class="catalog__title">Выбери свой Pop-It!</h2>
      
      <div class="catalog__grid">
        <!-- Карточка 1 -->
        <article class="card">
          <div class="card__image-container">
            <img src="./assets/square.png" alt="Разноцветный квадратный Pop-It" class="card__image">
          </div>
          <h3 class="card__title">Разноцветный квадратный</h3>
          <button class="card__btn" type="button">КУПИТЬ</button>
        </article>

        <article class="card">
          <div class="card__image-container">
            <img src="./assets/amongus.png" alt="Among Us, мраморный Pop-It" class="card__image">
          </div>
          <h3 class="card__title">Among Us, мраморный</h3>
          <button class="card__btn" type="button">КУПИТЬ</button>
        </article>

        <article class="card">
          <div class="card__image-container">
            <img src="./assets/round.png" alt="Разноцветный круглый Pop-It" class="card__image">
          </div>
          <h3 class="card__title">Разноцветный круглый</h3>
          <button class="card__btn" type="button">КУПИТЬ</button>
        </article>
      </div>
    </div>
  </main>

  <footer class="footer" id="contacts">
    <div class="container footer__container">
      <a href="#" class="footer__logo">НЕ_ПУПЫРКА.РУ</a>
      <nav class="footer__nav">
        <a href="#" class="footer__link">Способы оплаты</a>
        <a href="#" class="footer__link">Доставка</a>
        <a href="#" class="footer__link">Опт</a>
        <a href="#" class="footer__link">Контакты</a>
      </nav>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
